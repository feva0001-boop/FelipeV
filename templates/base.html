<!DOCTYPE html>
<html lang="da">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Felipe Vasquez</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/stylesheet.css') }}">
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <link rel="icon" sizes="48x48" type="image/png" href="{{ url_for('static', filename='images/favicon.png') }}">
    </head>
    <body>

        <header class="site-header">
            <div class="site-header-inner">
                <a href="/" class="site-logo">Felipe Vasquez</a>

                <nav class="site-nav">
                    <a href="/">Forside</a>
                    <a href="{{ url_for('cv') }}">CV</a>
                    <a href="/about">Om mig</a>

                     <a href="https://www.linkedin.com/in/felipe-crv" target="_blank" rel="noopener noreferrer">
                        <img src="{{ url_for('static', filename='images/linkedin.png') }}" alt="LinkedIn" class="linkedin-icon">
                    </a>
        
                    <a href="https://www.facebook.com/felipe.vasquezzzzzzzzzzzzzzzzz" target="_blank" rel="noopener noreferrer">
                        <img src="{{ url_for('static', filename='images/facebook.png') }}" alt="Facebook" class="facebook-icon">
                    </a>
        
                    <a href="https://www.instagram.com/felipe.crv/" target="_blank" rel="noopener noreferrer">
                        <img src="{{ url_for('static', filename='images/instagram.png') }}" alt="Instagram" class="instagram-icon">
                    </a>
                </nav>
            </div>
        </header>

        <main>
            {% block content %}
            {% endblock %}
        </main>

        <footer class="site-footer">
            © 2026 Felipe Vasquez
        </footer>

        <script src="{{ url_for('static', filename='js/script.js') }}"></script>
